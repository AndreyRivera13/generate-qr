<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de código QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f4f5f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 32px;
    width: 380px;
    max-width: 90vw;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align: center;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 20px;
    color: #1a1a1a;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d8dadf;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: #6c5ce7;
  }
  .row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    align-items: center;
    justify-content: center;
  }
  select {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #d8dadf;
    font-size: 13px;
  }
  button {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #6c5ce7;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #5a4bd6; }
  #qrcode {
    margin: 24px auto 8px;
    display: flex;
    justify-content: center;
    min-height: 200px;
    align-items: center;
  }
  #qrcode img, #qrcode canvas {
    border-radius: 8px;
  }
  #downloadBtn {
    display: none;
    background: #2d3436;
  }
  #downloadBtn:hover { background: #1a1e1e; }
  .hint {
    font-size: 12px;
    color: #8a8f98;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Generador de código QR</h1>
  <input type="text" id="textInput" placeholder="Escribe un texto o pega un link...">
  <div class="row">
    <label for="size" class="hint">Tamaño:</label>
    <select id="size">
      <option value="150">Pequeño</option>
      <option value="250" selected>Mediano</option>
      <option value="350">Grande</option>
    </select>
  </div>
  <button id="generateBtn">Generar QR</button>
  <div id="qrcode"></div>
  <button id="downloadBtn">Descargar PNG</button>
</div>

<script>
  const qrcodeDiv = document.getElementById('qrcode');
  const textInput = document.getElementById('textInput');
  const sizeSelect = document.getElementById('size');
  const generateBtn = document.getElementById('generateBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  let qr = null;

  function generate() {
    const text = textInput.value.trim();
    if (!text) {
      textInput.focus();
      return;
    }
    qrcodeDiv.innerHTML = '';
    const size = parseInt(sizeSelect.value, 10);
    qr = new QRCode(qrcodeDiv, {
      text: text,
      width: size,
      height: size,
      colorDark: '#1a1a1a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    downloadBtn.style.display = 'block';
  }

  function download() {
    const canvas = qrcodeDiv.querySelector('canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  generateBtn.addEventListener('click', generate);
  downloadBtn.addEventListener('click', download);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') generate();
  });
</script>

</body>
</html>
